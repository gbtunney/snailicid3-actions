name: z Call Detect Release State

# ─────────────────────────────────────────────────────────────
# WORKFLOW: Detect Release State
# TYPE: reusable workflow_call
# SOURCE: gbtunney/snailicid3-actions
# ─────────────────────────────────────────────────────────────

on:
    workflow_call:
        inputs:
            ref:
                description: >
                    Git ref, branch, tag, or SHA to inspect. Leave empty to inspect the triggering commit.
                required: false
                type: string
                default: ''

        outputs:
            checked_ref:
                description: The resolved commit SHA that was inspected.
                value: ${{ jobs.detect.outputs.checked_ref }}

            changeset_count:
                description: Number of pending .changeset/*.md files, excluding README.md.
                value: ${{ jobs.detect.outputs.changeset_count }}

            changeset_slugs:
                description: Sorted, space-delimited pending changeset file basenames without .md.
                value: ${{ jobs.detect.outputs.changeset_slugs }}

            primary_changeset_slug:
                description: First sorted pending changeset basename without .md, or empty when none.
                value: ${{ jobs.detect.outputs.primary_changeset_slug }}

            has_pending_changesets:
                description: "'true' when pending changeset files exist."
                value: ${{ jobs.detect.outputs.has_pending_changesets }}

            package_count:
                description: Total package.json files discovered.
                value: ${{ jobs.detect.outputs.package_count }}

            public_package_count:
                description: Non-private packages with name and version.
                value: ${{ jobs.detect.outputs.public_package_count }}

            private_package_count:
                description: Private packages discovered.
                value: ${{ jobs.detect.outputs.private_package_count }}

            invalid_package_count:
                description: Packages missing name or version.
                value: ${{ jobs.detect.outputs.invalid_package_count }}

            new_package_count:
                description: Public packages whose package name does not exist on npm.
                value: ${{ jobs.detect.outputs.new_package_count }}

            new_version_count:
                description: Public packages whose name exists on npm but local version is new.
                value: ${{ jobs.detect.outputs.new_version_count }}

            already_published_count:
                description: Public packages whose exact local version already exists on npm.
                value: ${{ jobs.detect.outputs.already_published_count }}

            lookup_failed_count:
                description: Packages whose npm lookup was inconclusive.
                value: ${{ jobs.detect.outputs.lookup_failed_count }}

            publish_candidate_count:
                description: Number of package versions that appear eligible for the publish flow.
                value: ${{ jobs.detect.outputs.publish_candidate_count }}

            publish_candidates:
                description: Space-delimited package@version entries that appear eligible for publish.
                value: ${{ jobs.detect.outputs.publish_candidates }}

            has_publish_candidates:
                description: "'true' when at least one public local package version is not on npm."
                value: ${{ jobs.detect.outputs.has_publish_candidates }}

            should_version:
                description: "'true' when pending changesets exist."
                value: ${{ jobs.detect.outputs.should_version }}

            should_publish:
                description: "'true' when no changesets remain and publish candidates exist."
                value: ${{ jobs.detect.outputs.should_publish }}

            should_skip:
                description: "'true' when no versioning or publishing action is needed."
                value: ${{ jobs.detect.outputs.should_skip }}

permissions:
    contents: read

jobs:
    detect:
        name: detect release state
        runs-on: ubuntu-latest

        outputs:
            checked_ref: ${{ steps.detect.outputs.checked_ref }}
            changeset_count: ${{ steps.detect.outputs.changeset_count }}
            changeset_slugs: ${{ steps.detect.outputs.changeset_slugs }}
            primary_changeset_slug: ${{ steps.detect.outputs.primary_changeset_slug }}
            has_pending_changesets: ${{ steps.detect.outputs.has_pending_changesets }}
            package_count: ${{ steps.detect.outputs.package_count }}
            public_package_count: ${{ steps.detect.outputs.public_package_count }}
            private_package_count: ${{ steps.detect.outputs.private_package_count }}
            invalid_package_count: ${{ steps.detect.outputs.invalid_package_count }}
            new_package_count: ${{ steps.detect.outputs.new_package_count }}
            new_version_count: ${{ steps.detect.outputs.new_version_count }}
            already_published_count: ${{ steps.detect.outputs.already_published_count }}
            lookup_failed_count: ${{ steps.detect.outputs.lookup_failed_count }}
            publish_candidate_count: ${{ steps.detect.outputs.publish_candidate_count }}
            publish_candidates: ${{ steps.detect.outputs.publish_candidates }}
            has_publish_candidates: ${{ steps.detect.outputs.has_publish_candidates }}
            should_version: ${{ steps.detect.outputs.should_version }}
            should_publish: ${{ steps.detect.outputs.should_publish }}
            should_skip: ${{ steps.detect.outputs.should_skip }}

        steps:
            - name: Checkout ref
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref || github.sha }}

            - name: Detect release state
              id: detect
              shell: bash
              run: |
                  set -euo pipefail

                  checked_ref="$(git rev-parse HEAD)"

                  echo "::group::Detect pending changesets"

                  # A repo without a .changeset directory (freshly bootstrapped)
                  # must read as "0 pending changesets", not crash: under
                  # `set -euo pipefail`, a bare `find .changeset` on a missing
                  # directory exits 1 and kills the job.
                  changeset_count=0
                  changeset_slug_values=()

                  if [ -d .changeset ]; then
                    changeset_count="$(
                      find .changeset -name "*.md" ! -name "README.md" \
                        | wc -l \
                        | tr -d ' '
                    )"

                    mapfile -t changeset_slug_values < <(
                      find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' -printf '%f\n' \
                        | sed 's/\.md$//' \
                        | LC_ALL=C sort
                    )
                  else
                    echo "No .changeset directory found; treating as zero pending changesets."
                  fi

                  changeset_slugs=""
                  primary_changeset_slug=""
                  if [ "${#changeset_slug_values[@]}" -gt 0 ]; then
                    changeset_slugs="$(printf '%s\n' "${changeset_slug_values[@]}" | paste -sd ' ' -)"
                    primary_changeset_slug="${changeset_slug_values[0]}"
                  fi

                  has_pending_changesets=false
                  if [ "$changeset_count" -gt 0 ]; then
                    has_pending_changesets=true
                  fi

                  echo "changeset_count=$changeset_count"
                  echo "changeset_slugs=$changeset_slugs"
                  echo "primary_changeset_slug=$primary_changeset_slug"
                  echo "has_pending_changesets=$has_pending_changesets"
                  echo "::endgroup::"

                  echo "::group::Build package inventory"

                  package_inventory_json="$(node <<'NODE'
                  const fs = require('node:fs');
                  const path = require('node:path');
                  const { execFileSync } = require('node:child_process');

                  const PublishStatus = {
                    Private: 'private',
                    Invalid: 'invalid',
                    NewPackage: 'new-package',
                    NewVersion: 'new-version',
                    AlreadyPublished: 'already-published',
                    LookupFailed: 'lookup-failed',
                  };

                  const ignoredParts = new Set([
                    '.git', 'node_modules', 'dist', 'types', 'coverage', 'tmp', 'temp', '.nx', '.turbo',
                  ]);

                  const packageJsonFiles = [];

                  function walk(directory) {
                    for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
                      if (ignoredParts.has(entry.name)) continue;
                      const fullPath = path.join(directory, entry.name);
                      if (entry.isDirectory()) { walk(fullPath); continue; }
                      if (entry.isFile() && entry.name === 'package.json') { packageJsonFiles.push(fullPath); }
                    }
                  }

                  function npmView(args) {
                    try {
                      const value = execFileSync('npm', ['view', ...args], { encoding: 'utf8', stdio: ['ignore', 'pipe', 'pipe'] }).trim();
                      return { ok: true, value };
                    } catch (error) {
                      const message = `${String(error?.stdout ?? '')}\n${String(error?.stderr ?? '')}`;
                      if (message.includes('E404') || message.includes('404 Not Found') || message.includes('is not in this registry')) {
                        return { ok: false, reason: 'not-found' };
                      }
                      return { ok: false, reason: 'lookup-failed' };
                    }
                  }

                  function getPublishInfo(name, version, isPrivate) {
                    if (isPrivate) return { latest_version: null, published_version: null, publish_status: PublishStatus.Private, publish_candidate: false };
                    if (!name || !version) return { latest_version: null, published_version: null, publish_status: PublishStatus.Invalid, publish_candidate: false };
                    const latest = npmView([name, 'version']);
                    const exact = npmView([`${name}@${version}`, 'version']);
                    if (exact.ok && exact.value === version) return { latest_version: latest.ok ? latest.value : null, published_version: exact.value, publish_status: PublishStatus.AlreadyPublished, publish_candidate: false };
                    if (latest.ok) return { latest_version: latest.value, published_version: null, publish_status: PublishStatus.NewVersion, publish_candidate: true };
                    if (latest.reason === 'not-found') return { latest_version: null, published_version: null, publish_status: PublishStatus.NewPackage, publish_candidate: true };
                    return { latest_version: null, published_version: null, publish_status: PublishStatus.LookupFailed, publish_candidate: false };
                  }

                  walk('.');

                  const inventory = packageJsonFiles.sort().map((filePath) => {
                    const parsed = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                    const name = typeof parsed.name === 'string' ? parsed.name : '';
                    const version = typeof parsed.version === 'string' ? parsed.version : '';
                    const isPrivate = parsed.private === true;
                    return { path: filePath.replace(/^\.\//,''), directory: path.dirname(filePath).replace(/^\.$/, '.').replace(/^\.\//,''), name, version, private: isPrivate, ...getPublishInfo(name, version, isPrivate) };
                  });

                  process.stdout.write(JSON.stringify(inventory));
                  NODE
                  )"

                  package_stats_json="$(node -e '
                    const inventory = JSON.parse(process.argv[1]);
                    const count = (status) => inventory.filter((pkg) => pkg.publish_status === status).length;
                    const candidates = inventory.filter((pkg) => pkg.publish_candidate === true);
                    const stats = {
                      package_count: inventory.length,
                      public_package_count: inventory.filter((pkg) => pkg.name && pkg.version && pkg.private !== true).length,
                      private_package_count: count("private"),
                      invalid_package_count: count("invalid"),
                      new_package_count: count("new-package"),
                      new_version_count: count("new-version"),
                      already_published_count: count("already-published"),
                      lookup_failed_count: count("lookup-failed"),
                      publish_candidate_count: candidates.length,
                      publish_candidates: candidates.map((pkg) => `${pkg.name}@${pkg.version}`).join(" "),
                    };
                    process.stdout.write(JSON.stringify(stats));
                  ' "$package_inventory_json")"

                  package_count="$(node -e 'console.log(JSON.parse(process.argv[1]).package_count)' "$package_stats_json")"
                  public_package_count="$(node -e 'console.log(JSON.parse(process.argv[1]).public_package_count)' "$package_stats_json")"
                  private_package_count="$(node -e 'console.log(JSON.parse(process.argv[1]).private_package_count)' "$package_stats_json")"
                  invalid_package_count="$(node -e 'console.log(JSON.parse(process.argv[1]).invalid_package_count)' "$package_stats_json")"
                  new_package_count="$(node -e 'console.log(JSON.parse(process.argv[1]).new_package_count)' "$package_stats_json")"
                  new_version_count="$(node -e 'console.log(JSON.parse(process.argv[1]).new_version_count)' "$package_stats_json")"
                  already_published_count="$(node -e 'console.log(JSON.parse(process.argv[1]).already_published_count)' "$package_stats_json")"
                  lookup_failed_count="$(node -e 'console.log(JSON.parse(process.argv[1]).lookup_failed_count)' "$package_stats_json")"
                  publish_candidate_count="$(node -e 'console.log(JSON.parse(process.argv[1]).publish_candidate_count)' "$package_stats_json")"
                  publish_candidates="$(node -e 'console.log(JSON.parse(process.argv[1]).publish_candidates)' "$package_stats_json")"

                  echo "package_count=$package_count"
                  echo "public_package_count=$public_package_count"
                  echo "private_package_count=$private_package_count"
                  echo "invalid_package_count=$invalid_package_count"
                  echo "new_package_count=$new_package_count"
                  echo "new_version_count=$new_version_count"
                  echo "already_published_count=$already_published_count"
                  echo "lookup_failed_count=$lookup_failed_count"
                  echo "publish_candidate_count=$publish_candidate_count"
                  echo "publish_candidates=$publish_candidates"
                  echo "::endgroup::"

                  has_publish_candidates=false
                  if [ "$publish_candidate_count" -gt 0 ]; then has_publish_candidates=true; fi

                  should_version=false; should_publish=false; should_skip=false
                  if [ "$has_pending_changesets" = "true" ]; then should_version=true
                  elif [ "$has_publish_candidates" = "true" ]; then should_publish=true
                  else should_skip=true; fi

                  {
                    echo "checked_ref=$checked_ref"
                    echo "changeset_count=$changeset_count"
                    echo "changeset_slugs=$changeset_slugs"
                    echo "primary_changeset_slug=$primary_changeset_slug"
                    echo "has_pending_changesets=$has_pending_changesets"
                    echo "package_count=$package_count"
                    echo "public_package_count=$public_package_count"
                    echo "private_package_count=$private_package_count"
                    echo "invalid_package_count=$invalid_package_count"
                    echo "new_package_count=$new_package_count"
                    echo "new_version_count=$new_version_count"
                    echo "already_published_count=$already_published_count"
                    echo "lookup_failed_count=$lookup_failed_count"
                    echo "publish_candidate_count=$publish_candidate_count"
                    echo "publish_candidates=$publish_candidates"
                    echo "has_publish_candidates=$has_publish_candidates"
                    echo "should_version=$should_version"
                    echo "should_publish=$should_publish"
                    echo "should_skip=$should_skip"
                  } >> "$GITHUB_OUTPUT"

            - name: Write release state summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Release state detector"
                    echo ""
                    echo "| Stat | Value |"
                    echo "|---|---:|"
                    echo "| changeset_count | \`${{ steps.detect.outputs.changeset_count }}\` |"
                    echo "| has_pending_changesets | \`${{ steps.detect.outputs.has_pending_changesets }}\` |"
                    echo "| publish_candidate_count | \`${{ steps.detect.outputs.publish_candidate_count }}\` |"
                    echo "| should_version | \`${{ steps.detect.outputs.should_version }}\` |"
                    echo "| should_publish | \`${{ steps.detect.outputs.should_publish }}\` |"
                    echo "| should_skip | \`${{ steps.detect.outputs.should_skip }}\` |"
                  } >> "$GITHUB_STEP_SUMMARY"
