name: z Call Release Plan

# SOURCE: gbtunney/snailicid3-actions

# ─────────────────────────────────────────────────────────────
# WORKFLOW: Release Plan
# TYPE: reusable (workflow_call)
#
# Purpose:
#   Run the release decision tree for one ref/SHA.
#
# This is intentionally separate from call-detect-release-state.yml:
#
#   call-detect-release-state.yml
#     Pure inventory/state detection. No build. No mutation. No publish.
#
#   call-release-plan.yml
#     Interprets that detected state as a release workflow plan.
#     It can be used manually now and by push-main later.
#
# Current behavior:
#   - Always detects release state.
#   - Always prints a readable plan.
#   - Optionally runs the validation/snapshot pipeline for publish candidates.
#   - Creates/updates a Changesets version PR when pending changesets exist and dry_run=false.
#   - Publishes validated release candidates when dry_run=false and no changesets remain.
#
# Safety:
#   - dry_run=true is the default expected caller behavior.
#   - dry_run=false is blocked unless the checked ref is main, unless
#     allow_non_main=true is explicitly passed.
# ─────────────────────────────────────────────────────────────

on:
    workflow_call:
        secrets:
            GH_PAT:
                description: Optional token used for checkout/push so follow-up workflows can be triggered.
                required: false
            NPM_TOKEN:
                description: Optional npm automation token for real publish runs.
                required: false

        inputs:
            ref:
                description: Branch, tag, or SHA to inspect. Leave empty to inspect the triggering commit.
                required: false
                default: ''
                type: string

            dry_run:
                description: Print what would happen without mutating or publishing.
                required: false
                default: true
                type: boolean

            allow_non_main:
                description: Allow non-dry-run actions away from main. Keep false except for controlled tests.
                required: false
                default: false
                type: boolean

            run_pipeline:
                description: Run the validation pipeline for publish candidates.
                required: false
                default: true
                type: boolean

            upload_workspace_artifact:
                description: Upload a workspace snapshot artifact from the validation pipeline for inspection/handoff.
                required: false
                default: true
                type: boolean

            require_lockfile:
                description: Treat frozen lockfile install as required when running the validation pipeline.
                required: false
                default: true
                type: boolean

            node_version:
                description: Node version to run the validation pipeline with.
                required: false
                default: lts/*
                type: string

            pnpm_cache:
                description: Control pnpm cache usage in the validation pipeline.
                required: false
                default: true
                type: boolean

        outputs:
            checked_ref:
                description: Resolved commit SHA inspected by release-state detection.
                value: ${{ jobs.detect.outputs.checked_ref }}

            release_phase:
                description: pending_changeset | pending_release | main
                value: ${{ jobs.plan.outputs.release_phase }}

            should_version:
                description: "'true' when pending changesets exist."
                value: ${{ jobs.detect.outputs.should_version }}

            should_publish:
                description: "'true' when no changesets remain and publish candidates exist."
                value: ${{ jobs.detect.outputs.should_publish }}

            should_skip:
                description: "'true' when no release action is needed."
                value: ${{ jobs.detect.outputs.should_skip }}

            publish_candidates:
                description: Space-delimited package@version publish candidates.
                value: ${{ jobs.detect.outputs.publish_candidates }}

            workspace_artifact_name:
                description: Workspace snapshot artifact name, when the pipeline ran and uploaded one.
                value: ${{ jobs.pending_release_pipeline.outputs.workspace_artifact_name }}

permissions:
    contents: write
    actions: write
    id-token: write
    pull-requests: write

jobs:
    detect:
        name: detect release state
        uses: ./.github/workflows/call-detect-release-state.yml
        with:
            ref: ${{ inputs.ref }}

    plan:
        name: release plan
        needs: detect
        runs-on: ubuntu-latest

        outputs:
            release_phase: ${{ steps.phase.outputs.release_phase }}

        steps:
            - name: Decide release phase
              id: phase
              shell: bash
              run: |
                  set -euo pipefail

                  if [ "${{ needs.detect.outputs.should_version }}" = "true" ]; then
                    release_phase="pending_changeset"
                  elif [ "${{ needs.detect.outputs.should_publish }}" = "true" ]; then
                    release_phase="pending_release"
                  else
                    release_phase="main"
                  fi

                  echo "release_phase=$release_phase" >> "$GITHUB_OUTPUT"

            - name: Print release plan
              shell: bash
              run: |
                  set -euo pipefail

                  phase="${{ steps.phase.outputs.release_phase }}"
                  dry_run="${{ inputs.dry_run }}"

                  {
                    echo "## 🧭 Release plan"
                    echo ""
                    echo "- input ref: ${{ inputs.ref || 'github.sha' }}"
                    echo "- checked ref: ${{ needs.detect.outputs.checked_ref }}"
                    echo "- dry run: ${{ inputs.dry_run }}"
                    echo "- allow non-main: ${{ inputs.allow_non_main }}"
                    echo "- phase: $phase"
                    echo ""
                    echo "## 📦 Release-state outputs"
                    echo ""
                    echo "- changeset_count: ${{ needs.detect.outputs.changeset_count }}"
                    echo "- changeset_slugs: ${{ needs.detect.outputs.changeset_slugs }}"
                    echo "- primary_changeset_slug: ${{ needs.detect.outputs.primary_changeset_slug }}"
                    echo "- has_pending_changesets: ${{ needs.detect.outputs.has_pending_changesets }}"
                    echo "- package_count: ${{ needs.detect.outputs.package_count }}"
                    echo "- public_package_count: ${{ needs.detect.outputs.public_package_count }}"
                    echo "- private_package_count: ${{ needs.detect.outputs.private_package_count }}"
                    echo "- invalid_package_count: ${{ needs.detect.outputs.invalid_package_count }}"
                    echo "- new_package_count: ${{ needs.detect.outputs.new_package_count }}"
                    echo "- new_version_count: ${{ needs.detect.outputs.new_version_count }}"
                    echo "- already_published_count: ${{ needs.detect.outputs.already_published_count }}"
                    echo "- lookup_failed_count: ${{ needs.detect.outputs.lookup_failed_count }}"
                    echo "- publish_candidate_count: ${{ needs.detect.outputs.publish_candidate_count }}"
                    echo "- publish_candidates: ${{ needs.detect.outputs.publish_candidates }}"
                    echo ""
                    echo "## ✅ Planned action"
                    echo ""

                    if [ "$phase" = "pending_changeset" ]; then
                      echo "This ref has pending changesets."
                      if [ "$dry_run" = "true" ]; then
                        echo "Dry run: would create or update a Changesets version PR."
                      else
                        echo "Real mode: would create or update a Changesets version PR."
                      fi
                    elif [ "$phase" = "pending_release" ]; then
                      echo "This ref has publish candidates and no pending changesets."
                      if [ "$dry_run" = "true" ]; then
                        echo "Dry run: would validate and prepare publish candidate artifacts."
                        echo "Dry run: would publish: ${{ needs.detect.outputs.publish_candidates }}."
                      else
                        echo "Real mode: would validate and publish: ${{ needs.detect.outputs.publish_candidates }}."
                      fi
                    else
                      echo "No release action is needed."
                    fi
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    guard_real_release:
        name: guard real release
        needs: [detect, plan]
        runs-on: ubuntu-latest
        if: ${{ inputs.dry_run == false }}

        steps:
            - name: Block unsafe non-main real release
              shell: bash
              run: |
                  set -euo pipefail

                  requested_ref="${{ inputs.ref }}"
                  allow_non_main="${{ inputs.allow_non_main }}"

                  if [ "$allow_non_main" = "true" ]; then
                    echo "allow_non_main=true; non-main real mode is allowed for this run."
                    exit 0
                  fi

                  if [ -z "$requested_ref" ] || [ "$requested_ref" = "main" ] || [ "$requested_ref" = "refs/heads/main" ]; then
                    echo "Real release mode allowed for main/default triggering ref."
                    exit 0
                  fi

                  echo "::error::dry_run=false is only allowed for main unless allow_non_main=true."
                  echo "requested_ref=$requested_ref"
                  exit 1

    pending_changeset:
        name: pending changeset version PR
        needs: [detect, plan, guard_real_release]
        if: ${{ always() && needs.detect.outputs.should_version == 'true' && (inputs.dry_run == true || needs.guard_real_release.result == 'success') }}
        runs-on: ubuntu-latest
        env:
            HUSKY: 0
            NX_NO_CLOUD: ${{ (vars.DISABLE_NX_CLOUD || 'true') == 'true' && 'true' || 'false' }}

        steps:
            - name: Checkout release source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref || github.sha }}
                  token: ${{ secrets.GH_PAT || github.token }}

            - name: Derive release branch from pending changesets
              id: release_branch
              shell: bash
              run: |
                  set -euo pipefail

                  changeset_count="${{ needs.detect.outputs.changeset_count }}"
                  primary_changeset_slug="${{ needs.detect.outputs.primary_changeset_slug }}"

                  if [[ "$changeset_count" -eq 0 || -z "$primary_changeset_slug" ]]; then
                    echo "::error::No pending changeset files were found to derive the release branch slug."
                    exit 1
                  fi

                  if [[ "$changeset_count" -eq 1 ]]; then
                    release_slug="$primary_changeset_slug"
                  else
                    first_slug="$primary_changeset_slug"
                    remaining_count="$((changeset_count - 1))"
                    release_slug="${first_slug}-plus-${remaining_count}-more"
                  fi

                  release_slug="$(printf '%s' "$release_slug" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"

                  if [[ -z "$release_slug" ]]; then
                    short_sha="${GITHUB_SHA:-$(git rev-parse --short HEAD)}"
                    release_slug="changeset-${short_sha:0:8}"
                  fi

                  max_slug_length=120
                  if [[ "${#release_slug}" -gt "$max_slug_length" ]]; then
                    release_slug="${release_slug:0:max_slug_length}"
                    release_slug="${release_slug%-}"
                  fi

                  release_branch="release/${release_slug}"

                  echo "slug=$release_slug" >> "$GITHUB_OUTPUT"
                  echo "branch=$release_branch" >> "$GITHUB_OUTPUT"
                  echo "count=$changeset_count" >> "$GITHUB_OUTPUT"
                  echo "Resolved release branch: $release_branch"

            - name: Plan version PR action
              if: ${{ inputs.dry_run == true }}
              shell: bash
              run: |
                  set -euo pipefail

                  echo "Dry run: would create/update a Changesets version PR."
                  echo "Dry run: pending changeset count = ${{ needs.detect.outputs.changeset_count }}"
                  echo "Dry run: target branch would be ${{ steps.release_branch.outputs.branch }}."
                  echo "Dry run: commit and PR title would be derived via scope-commit (release(<scopes>): version packages)."

            - name: Setup pnpm
              if: ${{ inputs.dry_run == false }}
              uses: pnpm/action-setup@v6
              with:
                  run_install: false

            - name: Setup Node
              if: ${{ inputs.dry_run == false }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ inputs.node_version }}
                  cache: ${{ inputs.pnpm_cache && 'pnpm' || '' }}

            - name: Install dependencies
              if: ${{ inputs.dry_run == false }}
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${{ inputs.require_lockfile }}" == "true" ]]; then
                    pnpm install --frozen-lockfile
                  else
                    pnpm install --no-frozen-lockfile
                  fi

            - name: Version packages
              if: ${{ inputs.dry_run == false }}
              run: pnpm changeset version

            - name: Stage and compute release title
              id: version_msg
              if: ${{ inputs.dry_run == false }}
              shell: bash
              run: |
                  set -euo pipefail

                  git add -A

                  if git diff --cached --quiet; then
                    echo "::error::Changesets version produced no staged changes."
                    exit 1
                  fi

                  if msg="$(pnpm exec scope-commit --staged --message release "version packages")" \
                    && [[ -n "$msg" ]]; then
                    :
                  else
                    msg="release(root): version packages"
                    echo "::warning::scope-commit failed to derive a scoped release message; falling back to: $msg"
                  fi

                  echo "message=$msg" >> "$GITHUB_OUTPUT"
                  echo "Release message: $msg"

            - name: Commit version changes
              if: ${{ inputs.dry_run == false }}
              shell: bash
              run: |
                  set -euo pipefail

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config commit.gpgsign false

                  git commit -m "${{ steps.version_msg.outputs.message }}" \
                    -m "Triggered by: @${{ github.actor }}" \
                    -m "Source ref: ${{ inputs.ref || github.sha }}" \
                    -m "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            - name: Push release branch
              if: ${{ inputs.dry_run == false }}
              run: git push origin HEAD:refs/heads/${{ steps.release_branch.outputs.branch }} --force

            - name: Create or update version PR
              if: ${{ inputs.dry_run == false }}
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
              run: |
                  set -euo pipefail

                  title="${{ steps.version_msg.outputs.message }}"
                  if [[ -z "$title" ]]; then
                    title="release(root): version packages"
                    echo "::warning::No computed release message available for the PR title; falling back to: $title"
                  fi
                  body="Automated version bump from Changesets. Merge this PR to publish packages to npm."
                  release_branch="${{ steps.release_branch.outputs.branch }}"

                  pr="$(gh pr list --head "$release_branch" --base main --state open --json number -q '.[0].number' 2>/dev/null || true)"

                  if [[ -z "$pr" ]]; then
                    gh pr create --head "$release_branch" --base main --title "$title" --body "$body"
                  else
                    gh pr edit "$pr" --title "$title" --body "$body"
                  fi

            - name: Version PR summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## 🧾 Pending changeset version PR"
                    echo ""
                    echo "- dry_run: ${{ inputs.dry_run }}"
                    echo "- source_ref: ${{ inputs.ref || github.sha }}"
                    echo "- changeset_count: ${{ needs.detect.outputs.changeset_count }}"
                    echo "- target_branch: ${{ steps.release_branch.outputs.branch }}"
                    echo "- title: ${{ steps.version_msg.outputs.message || 'derived via scope-commit (dry run: not computed)' }}"
                  } >> "$GITHUB_STEP_SUMMARY"

    pending_release_pipeline:
        name: pending release candidate pipeline
        needs: [detect, plan, guard_real_release]
        if: ${{ always() && inputs.run_pipeline == true && needs.detect.outputs.should_publish == 'true' && (inputs.dry_run == true || needs.guard_real_release.result == 'success') }}
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: true
            api_report_mode: 'check'
            node_version: ${{ inputs.node_version }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            upload_workspace_artifact: ${{ inputs.upload_workspace_artifact }}
            artifact_name_prefix: release-candidate
            disable_nx_cloud: 'vars'

    pending_release_publish_plan:
        name: pending release publish plan
        needs: [detect, plan, guard_real_release, pending_release_pipeline]
        if: ${{ always() && inputs.dry_run == true && needs.detect.outputs.should_publish == 'true' }}
        runs-on: ubuntu-latest

        steps:
            - name: Plan publish action
              shell: bash
              run: |
                  set -euo pipefail

                  {
                    echo "## 🚀 Publish plan"
                    echo ""
                    echo "- dry run: ${{ inputs.dry_run }}"
                    echo "- publish candidates: ${{ needs.detect.outputs.publish_candidates }}"
                    echo "- pipeline result: ${{ needs.pending_release_pipeline.result }}"
                    echo "- workspace artifact: ${{ needs.pending_release_pipeline.outputs.workspace_artifact_name }}"
                    echo ""

                    if [ "${{ inputs.dry_run }}" = "true" ]; then
                      echo "Dry run: would publish the listed candidates after validation."
                    fi
                  } | tee -a "$GITHUB_STEP_SUMMARY"

    pending_release_publish:
        name: pending release publish
        needs: [detect, plan, guard_real_release, pending_release_pipeline]
        if: ${{ always() && inputs.dry_run == false && needs.guard_real_release.result == 'success' && needs.detect.outputs.should_publish == 'true' && needs.pending_release_pipeline.result == 'success' && needs.pending_release_pipeline.outputs.artifact_uploaded == 'true' }}
        uses: ./.github/workflows/call-apply-workspace-artifact.yml
        secrets: inherit
        with:
            ref: ${{ inputs.ref || github.sha }}
            artifact_name: ${{ needs.pending_release_pipeline.outputs.workspace_artifact_name }}
            commit_mode: skip
            install_dependencies: true
            require_lockfile: ${{ inputs.require_lockfile }}
            node_version: ${{ inputs.node_version }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            post_overlay_command: |
                set -euo pipefail

                npm whoami
                pnpm changeset publish

                publish_candidates="${{ needs.detect.outputs.publish_candidates }}"

                if [[ -z "$publish_candidates" ]]; then
                  echo "No publish candidates detected after publish; skipping GitHub Release creation."
                  exit 0
                fi

                for tag_name in $publish_candidates; do
                  # Changesets creates tags locally during publish but may also push them.
                  # If the tag is already on origin, skip. If it exists locally but not on
                  # origin, push it with explicit src:dst. If it is absent locally (Changesets
                  # pushed it already or tag creation failed), warn and continue so the
                  # GitHub Release step still runs.
                  if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
                    echo "Tag already exists on origin: $tag_name"
                  elif git rev-parse --verify "refs/tags/${tag_name}" >/dev/null 2>&1; then
                    git push origin "refs/tags/${tag_name}:refs/tags/${tag_name}"
                  else
                    echo "::warning::Local tag not found for ${tag_name}; Changesets may have pushed it already."
                  fi

                  if gh release view "${tag_name}" >/dev/null 2>&1; then
                    echo "GitHub Release already exists for $tag_name."
                    continue
                  fi

                  echo "Creating GitHub Release for $tag_name."
                  gh release create "${tag_name}" --title "${tag_name}" --generate-notes
                done

                {
                  echo "## 🚀 Publish complete"
                  echo ""
                  echo "- published candidates: $publish_candidates"
                  echo "- tags pushed: true"
                  echo "- github releases ensured: true"
                } >> "$GITHUB_STEP_SUMMARY"

    main:
        name: no release action
        needs: [detect, plan]
        if: ${{ needs.detect.outputs.should_skip == 'true' }}
        runs-on: ubuntu-latest

        steps:
            - name: Noop
              run: echo "No release action needed."

    outcome:
        name: outcome summary
        needs: [detect, plan, pending_changeset, pending_release_publish, main]
        if: ${{ always() }}
        runs-on: ubuntu-latest

        steps:
            - name: Summarize release outcome
              shell: bash
              run: |
                  set -euo pipefail

                  phase="${{ needs.plan.outputs.release_phase }}"
                  changeset_result="${{ needs.pending_changeset.result }}"
                  publish_result="${{ needs.pending_release_publish.result }}"
                  main_result="${{ needs.main.result }}"

                  {
                    echo "## 🎯 Release outcome"
                    echo ""
                    echo "- phase: $phase"
                    echo "- should_version: ${{ needs.detect.outputs.should_version }}"
                    echo "- should_publish: ${{ needs.detect.outputs.should_publish }}"
                    echo ""

                    if [ "$phase" = "pending_changeset" ]; then
                      if [ "$changeset_result" = "success" ]; then
                        echo "✅ **Changeset PR flow ran successfully**"
                      else
                        echo "❌ **Changeset PR flow did not complete successfully** (result: $changeset_result)"
                      fi
                    elif [ "$phase" = "pending_release" ]; then
                      if [ "$publish_result" = "success" ]; then
                        echo "✅ **Publish flow ran successfully**"
                      else
                        echo "❌ **Publish flow did not complete successfully** (result: $publish_result)"
                      fi
                    else
                      if [ "$main_result" = "success" ]; then
                        echo "ℹ️ **No release action was required**"
                      else
                        echo "⚠️ **No-action path did not complete cleanly** (result: $main_result)"
                      fi
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"
