# ─────────────────────────────────────────────────────────────
# CALLER TEMPLATE — copy this file into <your-repo>/.github/workflows/
# Source of truth: gbtunney/snailicid3-actions/templates/workflows/
# These are thin triggers; all logic lives in the reusable call-* workflows.
# ─────────────────────────────────────────────────────────────
name: Dispatch Pipeline

on:
    workflow_dispatch:
        inputs:
            mode:
                description: Failure mode
                required: true
                default: abort_on_error
                type: choice
                options:
                    - report
                    - abort_on_error
            check_mode:
                description: Check routine mode
                required: true
                default: check
                type: choice
                options:
                    - fix
                    - check
                    - skip
            api_report_mode:
                description: Api Report Mode
                required: true
                default: skip
                type: choice
                options:
                    - update
                    - check
                    - skip

            require_lockfile:
                description: Treat frozen lockfile install as required
                required: true
                default: false
                type: boolean
            require_clean_repo:
                description: Fail if repository becomes dirty
                required: true
                default: false
                type: boolean
            disable_nx_cloud:
                description: Disable Nx Cloud policy for this run. (true) means its disabled
                required: true
                default: vars
                type: choice
                options:
                    - vars
                    - 'true'
                    - 'false'

            run_build:
                description: Run pnpm build
                required: true
                default: true
                type: boolean
            run_test:
                description: Run pnpm test
                required: true
                default: false
                type: boolean
            run_docs_build:
                description: Run docs build routine
                required: true
                default: false
                type: boolean
            run_chromatic:
                description: Run Chromatic visual tests (requires CHROMATIC_PROJECT_TOKEN secret)
                required: true
                default: false
                type: boolean

            node_version:
                description: Node version to run
                required: true
                default: lts/*
                type: choice
                options:
                    - 'lts/*'
                    - '20'
                    - '22'
                    - '24'
            nx_cache_reset:
                description: Run nx cache reset before routines
                required: true
                default: false
                type: boolean
            pnpm_cache:
                description: Control pnpm cache usage (disable with false, default true)
                required: true
                default: true
                type: boolean
            upload_workspace_artifact:
                description: Upload workspace artifact at end (for debugging / downstream jobs)
                required: true
                default: false
                type: boolean
            artifact_name_prefix:
                description: Artifact name prefix (artifact name also includes repo + run id)
                required: true
                default: workspace
                type: string
            use_nx_affected:
                description: Run nx affected instead of full workspace build/test/check
                required: true
                default: false
                type: boolean
            nx_targets:
                description: Space-delimited Nx targets for affected mode
                required: true
                default: lint test build
                type: string
            nx_fix_ci:
                description: Run nx fix-ci after main steps (Nx Cloud self-healing CI)
                required: true
                default: false
                type: boolean

permissions:
    contents: read
    actions: read

jobs:
    pipeline:
        uses: gbtunney/snailicid3-actions/.github/workflows/call-pipeline.yml@main
        secrets: inherit
        with:
            mode: ${{ inputs.mode }}
            check_mode: ${{ inputs.check_mode }}
            disable_nx_cloud: ${{ inputs.disable_nx_cloud }}
            api_report_mode: ${{ inputs.api_report_mode }}
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: ${{ inputs.require_clean_repo }}
            run_build: ${{ inputs.run_build }}
            run_test: ${{ inputs.run_test }}
            run_docs_build: ${{ inputs.run_docs_build }}
            run_chromatic: ${{ inputs.run_chromatic }}
            node_version: ${{ inputs.node_version }}
            nx_cache_reset: ${{ inputs.nx_cache_reset }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            upload_workspace_artifact: ${{ inputs.upload_workspace_artifact }}
            artifact_name_prefix: ${{ inputs.artifact_name_prefix }}
            use_nx_affected: ${{ inputs.use_nx_affected }}
            nx_targets: ${{ inputs.nx_targets }}
            nx_fix_ci: ${{ inputs.nx_fix_ci }}

    summary:
        name: Summarize pipeline outputs
        runs-on: ubuntu-latest
        needs: pipeline
        if: ${{ always() }}
        steps:
            - name: 🧧 Output Summary
              shell: bash
              run: |
                  {
                    echo "## Pipeline Dispatch 결과"
                    echo ""
                    echo "- pipeline result: \`${{ needs.pipeline.result }}\`"
                    echo "- is_repo_dirty: \`${{ needs.pipeline.outputs.is_repo_dirty }}\`"
                    echo "- artifact_uploaded: \`${{ needs.pipeline.outputs.artifact_uploaded }}\`"
                    echo "- workspace_artifact_name: \`${{ needs.pipeline.outputs.workspace_artifact_name }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
